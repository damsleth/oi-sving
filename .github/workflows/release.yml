name: release

# Cross-compile the standalone signaling binary for every platform we publish
# and attach the artifacts to a GitHub Release. Triggered by pushing a tag of
# the form vX.Y.Z, or manually via the Actions tab.
#
# Each archive contains a single `oi-sving` (or .exe) binary with
# the browser bundle, CSS, sounds, images, and index.html embedded inside.
# Run it on a clean machine with no extra files: `./oi-sving`, then
# open http://localhost:8787.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to use as the release name (e.g. v1.6.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build standalone binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # 'bun run test' fires the pretest hook (bun run build), guaranteeing
      # dist/ exists before the signaling-server integration test spawns a
      # child that imports server/embedded-assets.ts. 'bun test' (no `run`)
      # would skip the hook and fail on missing dist/ imports.
      - name: Test
        run: bun run test

      - name: Cross-compile standalone binaries
        run: bun run build:signaling:all

      - name: Package archives
        id: package
        run: |
          set -euo pipefail
          archives_dir="$GITHUB_WORKSPACE/dist/release-archives"
          mkdir -p "$archives_dir"
          tag_name="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          if [[ -z "$tag_name" ]]; then tag_name="dev-$(date +%Y%m%d%H%M%S)"; fi
          echo "tag=$tag_name" >> "$GITHUB_OUTPUT"

          cd dist/server/release
          for dir in */; do
            target="${dir%/}"
            archive_base="oi-sving-${tag_name}-${target}"
            if [[ "$target" == windows-* ]]; then
              # Subshell because zip can't read its archive path relative
              # to a -C-style flag, so we cd into the binary's dir first.
              # Use an absolute archive path so the relative-path math
              # doesn't depend on how deep the cd took us.
              (cd "$dir" && zip -9 "$archives_dir/${archive_base}.zip" "oi-sving.exe")
            else
              tar -C "$dir" -czf "$archives_dir/${archive_base}.tar.gz" "oi-sving"
            fi
          done

          cd "$archives_dir"
          shasum -a 256 * > SHA256SUMS.txt
          ls -la

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oi-sving-${{ steps.package.outputs.tag }}
          path: dist/release-archives/*
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release-archives/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            Standalone single-file Bun executables of the Oi, Sving! LAN signaling/asset server.

            Each archive contains one `oi-sving` (or `.exe`) with the browser bundle,
            CSS, sounds, images, and `index.html` embedded inside. No external files needed.

            ## Usage

            Linux/macOS:
            ```sh
            tar -xzf oi-sving-${{ github.ref_name }}-<platform>.tar.gz
            ./oi-sving
            ```

            Windows:
            ```powershell
            Expand-Archive oi-sving-${{ github.ref_name }}-windows-x64.zip
            .\oi-sving.exe
            ```

            Then open http://localhost:8787. Override port or bind host with
            `BIND_HOST=0.0.0.0 PORT=9000 ./oi-sving`.

            ## Verify

            `SHA256SUMS.txt` is included alongside the archives:
            ```sh
            shasum -a 256 -c SHA256SUMS.txt
            ```
